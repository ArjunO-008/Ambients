<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: rgba(255,255,255,0.15);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  #label { transition: opacity 0.3s; }
</style>
</head>
<body>
  <div id="label">ambient</div>
  <script>
    window.ambientspace.onAudio(function(bands) {
      const energy = bands.reduce((a, b) => a + b, 0) / bands.length
      document.getElementById('label').style.opacity = 0.1 + energy * 0.9
    })
  </script>
</body>
</html>
